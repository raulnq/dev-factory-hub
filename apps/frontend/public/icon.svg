<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#g)"/>

  <!-- Gear teeth (outer ring) -->
  <g fill="#fff" opacity="0.92">
    <rect x="44" y="14" width="12" height="10" rx="2"/>
    <rect x="44" y="76" width="12" height="10" rx="2"/>
    <rect x="14" y="44" width="10" height="12" rx="2"/>
    <rect x="76" y="44" width="10" height="12" rx="2"/>
    <rect x="22" y="20" width="10" height="10" rx="2" transform="rotate(45 27 25)"/>
    <rect x="68" y="20" width="10" height="10" rx="2" transform="rotate(45 73 25)"/>
    <rect x="22" y="70" width="10" height="10" rx="2" transform="rotate(45 27 75)"/>
    <rect x="68" y="70" width="10" height="10" rx="2" transform="rotate(45 73 75)"/>
  </g>

  <!-- Gear body (ring) -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="#fff" stroke-width="8" opacity="0.92"/>

  <!-- Hub center -->
  <circle cx="50" cy="50" r="10" fill="#fff"/>

  <!-- Hub connection dots -->
  <circle cx="50" cy="34" r="3.5" fill="#fff"/>
  <circle cx="50" cy="66" r="3.5" fill="#fff"/>
  <circle cx="34" cy="50" r="3.5" fill="#fff"/>
  <circle cx="66" cy="50" r="3.5" fill="#fff"/>

  <!-- Connection lines from center to dots -->
  <g stroke="#fff" stroke-width="2.5" opacity="0.7">
    <line x1="50" y1="40" x2="50" y2="36"/>
    <line x1="50" y1="60" x2="50" y2="64"/>
    <line x1="40" y1="50" x2="36" y2="50"/>
    <line x1="60" y1="50" x2="64" y2="50"/>
  </g>

  <!-- Inner hub icon: "H" for Hub -->
  <text x="50" y="56" text-anchor="middle" fill="url(#g)" font-family="Arial, sans-serif" font-size="16" font-weight="bold">H</text>
</svg>
